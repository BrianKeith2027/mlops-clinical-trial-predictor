# ============================================================
# MLOps Clinical Trial Predictor — Docker Compose
# Author: Brian Stratton
# Orchestrates API, MLflow, and Streamlit services
# ============================================================

version: "3.9"

services:
  # FastAPI prediction service
    api:
        build:
              context: .
                    dockerfile: Dockerfile
                          target: production
                              container_name: trial-predictor-api
                                  ports:
                                        - "8000:8000"
                                            environment:
                                                  - MODEL_PATH=/app/models/xgb_trial_predictor.joblib
                                                        - MLFLOW_TRACKING_URI=http://mlflow:5000
                                                              - LOG_LEVEL=INFO
                                                                  volumes:
                                                                        - ./models:/app/models
                                                                            depends_on:
                                                                                  - mlflow
                                                                                      restart: unless-stopped
                                                                                          healthcheck:
                                                                                                test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
                                                                                                      interval: 30s
                                                                                                            timeout: 10s
                                                                                                                  retries: 3
                                                                                                                  
                                                                                                                    # MLflow tracking server
                                                                                                                      mlflow:
                                                                                                                          image: ghcr.io/mlflow/mlflow:v2.9.2
                                                                                                                              container_name: trial-predictor-mlflow
                                                                                                                                  ports:
                                                                                                                                        - "5000:5000"
                                                                                                                                            environment:
                                                                                                                                                  - MLFLOW_BACKEND_STORE_URI=sqlite:///mlflow/mlflow.db
                                                                                                                                                        - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlflow/artifacts
                                                                                                                                                            volumes:
                                                                                                                                                                  - mlflow_data:/mlflow
                                                                                                                                                                      command: >
                                                                                                                                                                            mlflow server
                                                                                                                                                                                  --backend-store-uri sqlite:///mlflow/mlflow.db
                                                                                                                                                                                        --default-artifact-root /mlflow/artifacts
                                                                                                                                                                                              --host 0.0.0.0
                                                                                                                                                                                                    --port 5000
                                                                                                                                                                                                        restart: unless-stopped
                                                                                                                                                                                                        
                                                                                                                                                                                                          # Streamlit demo interface
                                                                                                                                                                                                            streamlit:
                                                                                                                                                                                                                build:
                                                                                                                                                                                                                      context: .
                                                                                                                                                                                                                            dockerfile: Dockerfile
                                                                                                                                                                                                                                  target: production
                                                                                                                                                                                                                                      container_name: trial-predictor-demo
                                                                                                                                                                                                                                          ports:
                                                                                                                                                                                                                                                - "8501:8501"
                                                                                                                                                                                                                                                    environment:
                                                                                                                                                                                                                                                          - API_URL=http://api:8000
                                                                                                                                                                                                                                                              command: ["streamlit", "run", "src/app/demo.py", "--server.port=8501", "--server.address=0.0.0.0"]
                                                                                                                                                                                                                                                                  depends_on:
                                                                                                                                                                                                                                                                        - api
                                                                                                                                                                                                                                                                            restart: unless-stopped
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                            volumes:
                                                                                                                                                                                                                                                                              mlflow_data:
