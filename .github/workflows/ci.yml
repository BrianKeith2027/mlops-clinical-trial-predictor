# ============================================================
# MLOps Clinical Trial Predictor — CI/CD Pipeline
# Author: Brian Stratton
# Runs on every push and PR: lint, test, build Docker image
# ============================================================

name: CI/CD Pipeline

on:
  push:
      branches: [main, develop]
        pull_request:
            branches: [main]

            env:
              PYTHON_VERSION: "3.11"

              jobs:
                # ── Lint & Type Check ─────────────────────────────────────
                  lint:
                      name: Lint & Type Check
                          runs-on: ubuntu-latest
                              steps:
                                    - uses: actions/checkout@v4

                                          - name: Set up Python
                                                  uses: actions/setup-python@v5
                                                          with:
                                                                    python-version: ${{ env.PYTHON_VERSION }}

                                                                          - name: Install dependencies
                                                                                  run: |
                                                                                            python -m pip install --upgrade pip
                                                                                                      pip install ruff mypy
                                                                                                      
                                                                                                            - name: Run Ruff linter
                                                                                                                    run: ruff check src/ tests/
                                                                                                                    
                                                                                                                          - name: Run MyPy type checker
                                                                                                                                  run: mypy src/ --ignore-missing-imports
                                                                                                                                          continue-on-error: true
                                                                                                                                          
                                                                                                                                            # ── Unit Tests ────────────────────────────────────────────
                                                                                                                                              test:
                                                                                                                                                  name: Test Suite
                                                                                                                                                      runs-on: ubuntu-latest
                                                                                                                                                          needs: lint
                                                                                                                                                              steps:
                                                                                                                                                                    - uses: actions/checkout@v4
                                                                                                                                                                    
                                                                                                                                                                          - name: Set up Python
                                                                                                                                                                                  uses: actions/setup-python@v5
                                                                                                                                                                                          with:
                                                                                                                                                                                                    python-version: ${{ env.PYTHON_VERSION }}
                                                                                                                                                                                                    
                                                                                                                                                                                                          - name: Install dependencies
                                                                                                                                                                                                                  run: |
                                                                                                                                                                                                                            python -m pip install --upgrade pip
                                                                                                                                                                                                                                      pip install -r requirements.txt
                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                            - name: Run tests with coverage
                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                              pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                    - name: Upload coverage report
                                                                                                                                                                                                                                                                            uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                              name: coverage-report
                                                                                                                                                                                                                                                                                                        path: coverage.xml
                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                          # ── Security Scan ─────────────────────────────────────────
                                                                                                                                                                                                                                                                                                            security:
                                                                                                                                                                                                                                                                                                                name: Security Scan
                                                                                                                                                                                                                                                                                                                    runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                        needs: lint
                                                                                                                                                                                                                                                                                                                            steps:
                                                                                                                                                                                                                                                                                                                                  - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                        - name: Set up Python
                                                                                                                                                                                                                                                                                                                                                uses: actions/setup-python@v5
                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                  python-version: ${{ env.PYTHON_VERSION }}
                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                        - name: Install Bandit
                                                                                                                                                                                                                                                                                                                                                                                run: pip install bandit
                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                      - name: Run Bandit security scan
                                                                                                                                                                                                                                                                                                                                                                                              run: bandit -r src/ -f json -o bandit-report.json || true
                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                    - name: Upload security report
                                                                                                                                                                                                                                                                                                                                                                                                            uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                                                                                                                                                              name: security-report
                                                                                                                                                                                                                                                                                                                                                                                                                                        path: bandit-report.json
                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                          # ── Docker Build ──────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                            docker:
                                                                                                                                                                                                                                                                                                                                                                                                                                                name: Docker Build
                                                                                                                                                                                                                                                                                                                                                                                                                                                    runs-on: ubuntu-latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                        needs: [test, security]
                                                                                                                                                                                                                                                                                                                                                                                                                                                            steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Set up Docker Buildx
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                uses: docker/setup-buildx-action@v3
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Build Docker image
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        docker build -t mlops-trial-predictor:latest .
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Verify container health
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                docker run -d --name test-api -p 8000:8000 mlops-trial-predictor:latest
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          sleep 10
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    curl -f http://localhost:8000/health || exit 1
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              docker stop test-api
